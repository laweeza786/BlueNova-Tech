<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - BlueNova Technologies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <!-- Glowing Background Orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 text-center">
                <a class="d-inline-flex align-items-center gap-2 fw-bold text-white fs-3 mb-4 text-decoration-none" href="/">
                    <i class="bi bi-rocket-takeoff-fill text-primary"></i> BlueNova <span class="gradient-text">ERP</span>
                </a>
                
                <div class="glass-panel p-5 text-start">
                    <h3 class="text-white mb-2">Create New Password</h3>
                    <p class="text-secondary small mb-4">Enter a strong, secure new password below.</p>
                    
                    <div id="reset-alert" class="alert alert-danger d-none small py-2" role="alert"></div>
                    <div id="reset-success" class="alert alert-success d-none small py-2" role="alert"></div>
                    
                    <form id="resetForm">
{% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label text-secondary small">New Password</label>
                            <input type="password" id="r-password" class="form-control form-control-premium" required placeholder="••••••••">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-secondary small">Confirm New Password</label>
                            <input type="password" id="r-confirm" class="form-control form-control-premium" required placeholder="••••••••">
                        </div>
                        
                        <button type="submit" id="reset-submit-btn" class="btn btn-premium w-100 py-3 mb-3">Update Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/mockData.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        document.getElementById("resetForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const pass = document.getElementById("r-password").value;
            const confirm = document.getElementById("r-confirm").value;
            
            const alertBox = document.getElementById("reset-alert");
            const successBox = document.getElementById("reset-success");
            const btn = document.getElementById("reset-submit-btn");
            
            alertBox.classList.add("d-none");
            successBox.classList.add("d-none");
            
            if (pass !== confirm) {
                alertBox.textContent = "Passwords do not match.";
                alertBox.classList.remove("d-none");
                return;
            }
            
            btn.disabled = true;
            btn.textContent = "Updating...";
            
            setTimeout(() => {
                successBox.textContent = "Password updated! Redirecting to login...";
                successBox.classList.remove("d-none");
                
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 1500);
            }, 800);
        });
    </script>
</body>
</html>
