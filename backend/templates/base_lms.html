<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Learning Portal - BlueNova ERP{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        .lms-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
            color: var(--text-color);
        }
        .lms-navbar {
            height: 70px;
            backdrop-filter: blur(10px);
            background: rgba(15, 23, 42, 0.45);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: sticky;
            top: 0;
            z-index: 1050;
            transition: background 0.3s, border-color 0.3s;
        }
        [data-theme="light"] .lms-navbar {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }
        .lms-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--heading-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .lms-nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .lms-nav-link:hover, .lms-nav-link.active {
            color: var(--primary-color);
        }
        .lms-body {
            flex: 1;
            padding: 30px 0;
        }
    </style>
</head>
<body>
    <div class="lms-wrapper">
        <!-- LMS Top Nav Bar -->
        <nav class="lms-navbar d-flex align-items-center">
            <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-4">
                    <a href="{% url 'dashboard' %}" class="btn btn-sm btn-outline-secondary me-2"><i class="bi bi-arrow-left-short"></i> ERP Portal</a>
                    <a href="{% url 'lms_dashboard' %}" class="lms-brand">
                        <i class="bi bi-journal-code text-primary fs-4"></i>
                        <span>BlueNova LMS</span>
                    </a>
                </div>
                
                <div class="d-flex align-items-center gap-4">
                    <a href="{% url 'lms_dashboard' %}" class="lms-nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
                    <a href="{% url 'lms_bookmarks' %}" class="lms-nav-link"><i class="bi bi-bookmark-star-fill"></i> Bookmarks</a>
                    {% if request.user.role == 'admin' %}
                        <a href="{% url 'lms_admin_panel' %}" class="lms-nav-link text-warning"><i class="bi bi-sliders2"></i> LMS Admin</a>
                    {% endif %}
                    <button class="theme-switch theme-toggle-btn" aria-label="Toggle Theme"></button>
                    
                    <div class="d-flex align-items-center gap-2">
                        <span class="small text-secondary">{{ request.user.username }}</span>
                        <img src="{% if request.user.profile.profile_picture %}{{ request.user.profile.profile_picture.url }}{% else %}/static/img/default_avatar.png{% endif %}" class="rounded-circle border" width="36" height="36" alt="">
                    </div>
                </div>
            </div>
        </nav>

        <!-- Dynamic Block Content -->
        <div class="lms-body">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simple dark/light switcher for base_lms
        const root = document.documentElement;
        const themeBtn = document.querySelector(".theme-switch");
        
        function setTheme(theme) {
            root.setAttribute("data-theme", theme);
            localStorage.setItem("erp_theme", theme);
            if (themeBtn) {
                if (theme === "light") {
                    themeBtn.classList.add("light");
                } else {
                    themeBtn.classList.remove("light");
                }
            }
        }
        
        const savedTheme = localStorage.getItem("erp_theme") || "dark";
        setTheme(savedTheme);
        
        if (themeBtn) {
            themeBtn.addEventListener("click", () => {
                const currentTheme = root.getAttribute("data-theme");
                const nextTheme = currentTheme === "dark" ? "light" : "dark";
                setTheme(nextTheme);
            });
        }
    </script>
</body>
</html>
