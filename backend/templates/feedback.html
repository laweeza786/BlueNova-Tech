<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - BlueNova ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css?v=6.6" rel="stylesheet">
</head>

<body>

    {% if request.user.is_authenticated %}
    <script>
        localStorage.setItem("erp_users", '{{ json_users|escapejs }}');
        localStorage.setItem("erp_files", '{{ json_files|escapejs }}');
        localStorage.setItem("erp_notifications", '{{ json_notifications|escapejs }}');
        localStorage.setItem("erp_messages", '{{ json_messages|escapejs }}');
        localStorage.setItem("erp_logs", '{{ json_logs|escapejs }}');
        localStorage.setItem("erp_history", '{{ json_history|escapejs }}');
        localStorage.setItem("erp_session", '{{ session_token }}');
    </script>
    {% endif %}


    <div class="app-wrapper">
        <!-- Sidebar Navigation -->
        {% include "includes/sidebar.html" with active_tab="feedback" %}

        <!-- Main Panel Workspace -->
        <main class="app-content">
            <!-- Top Navbar -->
            <header class="app-navbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="sidebar-toggler sidebar-toggle-btn d-lg-block text-white"
                        aria-label="Toggle Sidebar"><i class="bi bi-list"></i></button>
                </div>
            </header>

            <!-- Feedback form page content -->
            <div class="app-body">
                <div class="mb-4">
                    <h2 class="text-white mb-1">Internship Experience Feedback</h2>
                    <p class="text-secondary small mb-0">Help us improve BlueNova cohort processes by submitting your
                        rating and comments.</p>
                </div>

                <div class="glass-panel p-5 col-lg-8">
                    <h4 class="text-white mb-4">Rate Your Cohort</h4>
                    <form id="feedbackForm">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label text-secondary small">Overall Rating (1 to 5 Stars)</label>
                            <select id="fb-rating" class="form-select form-control-premium" required>
                                <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                                <option value="4">⭐⭐⭐⭐ (Good)</option>
                                <option value="3">⭐⭐⭐ (Average)</option>
                                <option value="2">⭐⭐ (Fair)</option>
                                <option value="1">⭐ (Poor)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Feedback Topic / Subject</label>
                            <input type="text" id="fb-subject" class="form-control form-control-premium"
                                placeholder="e.g. Mentor session scheduling feedback" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-secondary small">Comments / Details</label>
                            <textarea id="fb-message" class="form-control form-control-premium" rows="5"
                                placeholder="Share your experience details..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-premium px-5 py-3">Submit Feedback</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/mockData.js"></script>
    <script src="/static/js/app.js?v={% now "U" %}"></script>
</body>

</html>
