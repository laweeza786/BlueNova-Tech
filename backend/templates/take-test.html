<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Test - BlueNova ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css?v=6.7" rel="stylesheet">
    <style>
        .question-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .option-label {
            display: block;
            padding: 12px 20px;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #ccc;
        }
        .option-label:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .option-input:checked + .option-label {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            color: #fff;
        }
        .option-input {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Forest Animation Background -->
    <div class="forest-bg-container">
        <div class="forest-layer layer-back"></div>
        <div class="forest-layer layer-mid"></div>
        <div class="forest-layer layer-front"></div>
        <div class="fireflies"></div>
    </div>

    <div class="app-wrapper">
        <!-- Main Panel Workspace (No Sidebar for focused testing) -->
        <main class="app-content w-100 ms-0 px-4 pt-4">
            <div class="max-w-4xl mx-auto" style="max-width: 800px; margin: 0 auto;">
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="text-white mb-1">{{ test.course_name }} - Week {{ test.week_number }} Test</h2>
                        <p class="text-secondary small mb-0"><i class="bi bi-clock-history me-1"></i> Expires on: {{ test.expires_at|date:"F d, Y h:i A" }}</p>
                    </div>
                    <a href="{% url 'assessments' %}" class="btn btn-secondary-premium"><i class="bi bi-x-lg me-1"></i> Cancel</a>
                </div>

                <div class="glass-panel p-4 mb-5">
                    <form id="test-form">
                        {% csrf_token %}
                        {% for q in test.questions_data %}
                        <div class="question-card">
                            <h5 class="text-white mb-3">{{ forloop.counter }}. {{ q.text }}</h5>
                            <div class="options-container">
                                {% for key, val in q.options.items %}
                                <label class="d-block">
                                    <input type="radio" name="q_{{ q.id }}" value="{{ key }}" class="option-input" required>
                                    <span class="option-label"><strong>{{ key }}.</strong> {{ val }}</span>
                                </label>
                                {% endfor %}
                            </div>
                        </div>
                        {% endfor %}
                        
                        <div class="text-end mt-4">
                            <button type="submit" class="btn btn-premium btn-lg px-5" id="submit-btn"><i class="bi bi-send-fill me-2"></i> Submit Test</button>
                        </div>
                    </form>
                </div>
                
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.getElementById('test-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            Swal.fire({
                title: 'Submit Test?',
                text: "You cannot change your answers once submitted.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3b82f6',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, submit!'
            }).then((result) => {
                if (result.isConfirmed) {
                    const formData = new FormData(this);
                    const answers = {};
                    
                    for (let [key, value] of formData.entries()) {
                        if (key.startsWith('q_')) {
                            const qId = key.split('_')[1];
                            answers[qId] = value;
                        }
                    }
                    
                    const csrf = document.querySelector('[name=csrfmiddlewaretoken]').value;
                    
                    document.getElementById('submit-btn').disabled = true;
                    document.getElementById('submit-btn').innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Submitting...';
                    
                    fetch('/erp/api/assessments/submit/{{ test.id }}/', {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': csrf,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ answers: answers })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            Swal.fire({
                                title: data.passed ? 'Congratulations!' : 'Test Complete',
                                text: `You scored ${data.score}/20.`,
                                icon: data.passed ? 'success' : 'info'
                            }).then(() => {
                                window.location.href = '/erp/assessments/';
                            });
                        } else {
                            Swal.fire('Error', data.message, 'error');
                            document.getElementById('submit-btn').disabled = false;
                            document.getElementById('submit-btn').innerHTML = '<i class="bi bi-send-fill me-2"></i> Submit Test';
                        }
                    });
                }
            });
        });
    </script>
</body>
</html>
