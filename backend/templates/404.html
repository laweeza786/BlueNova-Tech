<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - 404</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css?v=6.4" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <!-- Glowing Background Orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="container py-5 text-center">
        <h1 class="display-1 text-white fw-bold mb-3"><span class="gradient-text">404</span></h1>
        <h3 class="text-white mb-4">Lost in Space?</h3>
        <p class="text-secondary mb-5 mx-auto col-md-6 lead">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        
        <div class="d-flex justify-content-center gap-3">
            <button onclick="history.back()" class="btn btn-secondary-premium btn-lg">Go Back</button>
            <a href="/" class="btn btn-premium btn-lg">Return Home</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/mockData.js"></script>
    <script src="/static/js/app.js?v={% now "U" %}"></script>
</body>
</html>
