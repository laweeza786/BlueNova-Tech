<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BlueNova Technologies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css?v=6.7" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <!-- Glowing Background Orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 text-center">
                <a class="d-inline-flex align-items-center gap-2 fw-bold text-white fs-3 mb-4 text-decoration-none" href="/">
                    <i class="bi bi-rocket-takeoff-fill text-primary"></i> BlueNova <span class="gradient-text">ERP</span>
                </a>

                {% if messages %}
                <div class="mb-3">
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} small py-2" role="alert">{{ message }}</div>
                    {% endfor %}
                </div>
                {% endif %}

                <div class="glass-panel p-5 text-start">
                    <h3 class="text-white mb-2">Welcome Back</h3>
                    <p class="text-secondary small mb-4">Enter your credentials to enter the BlueNova platform.</p>

                    <div id="login-alert" class="alert alert-danger d-none small py-2" role="alert"></div>

                    <form id="loginForm">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label text-secondary small">Username or Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" id="login-username" name="username" class="form-control form-control-premium" required placeholder="Enter username or email">
                            </div>
                        </div>
                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label class="form-label text-secondary small">Password</label>
                                <a href="{% url 'forgot_password' %}" class="small text-primary text-decoration-none">Forgot password?</a>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" id="login-password" name="password" class="form-control form-control-premium" required placeholder="••••••••">
                            </div>
                        </div>

                        <button type="submit" id="login-submit-btn" class="btn btn-premium w-100 py-3 mb-3">Sign In</button>

                        <div class="text-center">
                            <span class="small text-secondary">Don't have an account? <a href="{% url 'signup' %}" class="text-primary text-decoration-none fw-semibold">Apply Now</a></span>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js?v={% now "U" %}"></script>
    <script>
        function getCsrfToken() {
            const cookie = document.cookie.split(';').find(c => c.trim().startsWith('csrftoken='));
            return cookie ? cookie.trim().split('=')[1] : '';
        }

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const alertBox = document.getElementById("login-alert");
            const btn = document.getElementById("login-submit-btn");

            alertBox.classList.add("d-none");
            btn.disabled = true;
            btn.textContent = "Authenticating...";

            const formData = new FormData();
            formData.append('username', document.getElementById('login-username').value.trim());
            formData.append('password', document.getElementById('login-password').value);

            fetch('/auth/login/', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCsrfToken()
                },
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    btn.textContent = "Success! Redirecting...";
                    window.location.href = data.redirect;
                } else {
                    alertBox.textContent = data.message || "Login failed. Please try again.";
                    alertBox.classList.remove("d-none");
                    
                    if (data.message === "User does not exist.") {
                        alertBox.textContent = "User does not exist. Redirecting to application form...";
                        btn.textContent = "Redirecting...";
                        setTimeout(() => {
                            window.location.href = '/courses/apply/';
                        }, 2000);
                        return;
                    }
                    
                    btn.disabled = false;
                    btn.textContent = "Sign In";
                }
            })
            .catch(err => {
                alertBox.textContent = "A network error occurred. Please try again.";
                alertBox.classList.remove("d-none");
                btn.disabled = false;
                btn.textContent = "Sign In";
                console.error(err);
            });
        });
    </script>
</body>
</html>
