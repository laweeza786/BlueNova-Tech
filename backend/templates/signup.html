<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply / Sign Up - BlueNova Technologies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css?v=6.4" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <!-- Glowing Background Orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="container py-5" style="margin-top: 40px; margin-bottom: 40px;">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 text-center">
                <a class="d-inline-flex align-items-center gap-2 fw-bold text-white fs-3 mb-4 text-decoration-none" href="/">
                    <i class="bi bi-rocket-takeoff-fill text-primary"></i> BlueNova <span class="gradient-text">ERP</span>
                </a>

                <div class="glass-panel p-5 text-start">
                    <h3 class="text-white mb-2">Apply for Internship</h3>
                    <p class="text-secondary small mb-4">Complete the fields below to submit your application details.</p>

                    <div id="signup-alert" class="alert alert-danger d-none small py-2" role="alert"></div>
                    <div id="signup-success" class="alert alert-success d-none small py-2" role="alert"></div>

                    <form id="signupForm">
                        {% csrf_token %}

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-secondary small">Username</label>
                                <input type="text" id="s-username" name="username" class="form-control form-control-premium" required placeholder="johndoe">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary small">Email Address</label>
                                <input type="email" id="s-email" name="email" class="form-control form-control-premium" required placeholder="john@example.com">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary small">Full Name</label>
                                <input type="text" id="s-fullname" name="fullname" class="form-control form-control-premium" required placeholder="John Doe">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary small">Track</label>
                                <select id="s-track" name="track" class="form-select form-control-premium" required>
                                    <option value="" disabled selected>Select Specialized Track</option>
                                    <option value="Software Engineering">Software Engineering</option>
                                    <option value="UI/UX Design">UI/UX Design</option>
                                    <option value="Data Analytics">Data Analytics</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label text-secondary small">Academic Background</label>
                                <input type="text" id="s-academic" name="academic" class="form-control form-control-premium" required placeholder="B.S. Computer Science, Stanford University">
                            </div>
                            <div class="col-12">
                                <label class="form-label text-secondary small">Bio Summary</label>
                                <textarea id="s-bio" name="bio" class="form-control form-control-premium" rows="3" required placeholder="Tell us briefly about your engineering/design goals..."></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary small">Password</label>
                                <input type="password" id="s-password" name="password" class="form-control form-control-premium" required placeholder="••••••••">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary small">Confirm Password</label>
                                <input type="password" id="s-confirm" name="confirm_password" class="form-control form-control-premium" required placeholder="••••••••">
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" id="signup-submit-btn" class="btn btn-premium w-100 py-3">Submit Application</button>
                            </div>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <span class="small text-secondary">Already applied? <a href="{% url 'login' %}" class="text-primary text-decoration-none fw-semibold">Login here</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js?v={% now "U" %}"></script>
    <script>
        function getCsrfToken() {
            const cookie = document.cookie.split(';').find(c => c.trim().startsWith('csrftoken='));
            return cookie ? cookie.trim().split('=')[1] : '';
        }

        document.getElementById("signupForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const alertBox = document.getElementById("signup-alert");
            const successBox = document.getElementById("signup-success");
            const btn = document.getElementById("signup-submit-btn");

            alertBox.classList.add("d-none");
            successBox.classList.add("d-none");

            // Client-side password match check
            const password = document.getElementById("s-password").value;
            const confirm = document.getElementById("s-confirm").value;
            if (password !== confirm) {
                alertBox.textContent = "Passwords do not match.";
                alertBox.classList.remove("d-none");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Submitting...";

            const formData = new FormData(document.getElementById("signupForm"));

            fetch('/auth/signup/', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCsrfToken()
                },
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    successBox.textContent = data.message || "Registration successful! Redirecting to login...";
                    successBox.classList.remove("d-none");
                    setTimeout(() => {
                        window.location.href = data.redirect || '/auth/login/';
                    }, 1500);
                } else {
                    alertBox.textContent = data.message || "Signup failed. Please try again.";
                    alertBox.classList.remove("d-none");
                    btn.disabled = false;
                    btn.textContent = "Submit Application";
                }
            })
            .catch(err => {
                alertBox.textContent = "A network error occurred. Please try again.";
                alertBox.classList.remove("d-none");
                btn.disabled = false;
                btn.textContent = "Submit Application";
                console.error(err);
            });
        });
    </script>
</body>
</html>
