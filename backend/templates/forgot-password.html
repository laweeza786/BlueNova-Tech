<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - BlueNova Technologies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <!-- Glowing Background Orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 text-center">
                <a class="d-inline-flex align-items-center gap-2 fw-bold text-white fs-3 mb-4 text-decoration-none" href="/">
                    <i class="bi bi-rocket-takeoff-fill text-primary"></i> BlueNova <span class="gradient-text">ERP</span>
                </a>
                
                <div class="glass-panel p-5 text-start">
                    <h3 class="text-white mb-2">Reset Password</h3>
                    <p class="text-secondary small mb-4">Enter your registered email address to receive password recovery details.</p>
                    
                    <div id="forgot-alert" class="alert alert-danger d-none small py-2" role="alert"></div>
                    <div id="forgot-success" class="alert alert-success d-none small py-2" role="alert"></div>
                    
                    <form id="forgotForm">
{% csrf_token %}

                        <div class="mb-4">
                            <label class="form-label text-secondary small">Email Address</label>
                            <input type="email" id="f-email" class="form-control form-control-premium" required placeholder="john@example.com">
                        </div>
                        
                        <button type="submit" id="forgot-submit-btn" class="btn btn-premium w-100 py-3 mb-3">Send Reset Instructions</button>
                        
                        <div class="text-center">
                            <span class="small text-secondary"><a href="/auth/login/" class="text-primary text-decoration-none fw-semibold">Back to Login</a></span>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/mockData.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        document.getElementById("forgotForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const emailVal = document.getElementById("f-email").value.trim().toLowerCase();
            const alertBox = document.getElementById("forgot-alert");
            const successBox = document.getElementById("forgot-success");
            const btn = document.getElementById("forgot-submit-btn");
            
            alertBox.classList.add("d-none");
            successBox.classList.add("d-none");
            btn.disabled = true;
            btn.textContent = "Processing...";
            
            setTimeout(() => {
                const users = JSON.parse(localStorage.getItem("erp_users") || "[]");
                const found = users.find(u => u.email === emailVal);
                
                if (found) {
                    successBox.innerHTML = `Recovery guidelines dispatched! Click <a href="/auth/reset-password/" class="alert-link">here</a> to reset.`;
                    successBox.classList.remove("d-none");
                } else {
                    btn.disabled = false;
                    btn.textContent = "Send Reset Instructions";
                    alertBox.textContent = "Email address not found in system.";
                    alertBox.classList.remove("d-none");
                }
            }, 800);
        });
    </script>
</body>
</html>
