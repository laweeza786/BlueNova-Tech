<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - BlueNova Technologies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css?v=6.6" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <!-- Glowing Background Orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 text-center">
                <a class="d-inline-flex align-items-center gap-2 fw-bold text-white fs-3 mb-4 text-decoration-none" href="/">
                    <i class="bi bi-rocket-takeoff-fill text-primary"></i> BlueNova <span class="gradient-text">ERP</span>
                </a>

                <div class="glass-panel p-5 text-start">
                    <h3 class="text-white mb-2">Reset Password</h3>
                    <p class="text-secondary small mb-4">Enter your registered email address to verify your account.</p>

                    <div id="forgot-alert" class="alert alert-danger d-none small py-2" role="alert"></div>
                    <div id="forgot-success" class="alert alert-success d-none small py-2" role="alert"></div>

                    <form id="forgotForm">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label class="form-label text-secondary small">Email Address</label>
                            <input type="email" id="f-email" name="email" class="form-control form-control-premium" required placeholder="john@example.com">
                        </div>

                        <button type="submit" id="forgot-submit-btn" class="btn btn-premium w-100 py-3 mb-3">Verify Email</button>

                        <div class="text-center">
                            <span class="small text-secondary"><a href="{% url 'login' %}" class="text-primary text-decoration-none fw-semibold">Back to Login</a></span>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js?v={% now "U" %}"></script>
    <script>
        function getCsrfToken() {
            const cookie = document.cookie.split(';').find(c => c.trim().startsWith('csrftoken='));
            return cookie ? cookie.trim().split('=')[1] : '';
        }

        document.getElementById("forgotForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const alertBox = document.getElementById("forgot-alert");
            const successBox = document.getElementById("forgot-success");
            const btn = document.getElementById("forgot-submit-btn");

            alertBox.classList.add("d-none");
            successBox.classList.add("d-none");
            btn.disabled = true;
            btn.textContent = "Verifying...";

            const formData = new FormData();
            formData.append('email', document.getElementById('f-email').value.trim().toLowerCase());

            fetch('/auth/forgot-password/', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCsrfToken()
                },
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    successBox.textContent = data.message || "Account verified. Redirecting...";
                    successBox.classList.remove("d-none");
                    setTimeout(() => {
                        window.location.href = data.redirect || '/auth/reset-password/';
                    }, 1200);
                } else {
                    alertBox.textContent = data.message || "Verification failed. Please try again.";
                    alertBox.classList.remove("d-none");
                    btn.disabled = false;
                    btn.textContent = "Verify Email";
                }
            })
            .catch(err => {
                alertBox.textContent = "A network error occurred. Please try again.";
                alertBox.classList.remove("d-none");
                btn.disabled = false;
                btn.textContent = "Verify Email";
                console.error(err);
            });
        });
    </script>
</body>
</html>
