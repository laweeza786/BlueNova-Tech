<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Accomplishments - BlueNova</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css?v=6.7" rel="stylesheet">
</head>

<body class="bg-user">

    {% if request.user.is_authenticated %}
    <script>
        localStorage.setItem("erp_users", '{{ json_users|escapejs }}');
        localStorage.setItem("erp_files", '{{ json_files|escapejs }}');
        localStorage.setItem("erp_notifications", '{{ json_notifications|escapejs }}');
        localStorage.setItem("erp_messages", '{{ json_messages|escapejs }}');
        localStorage.setItem("erp_logs", '{{ json_logs|escapejs }}');
        localStorage.setItem("erp_history", '{{ json_history|escapejs }}');
        localStorage.setItem("erp_session", '{{ session_token }}');
    </script>
    {% endif %}


    
    <!-- Forest Animation Background -->
    <div class="forest-bg-container">
        <div class="forest-layer layer-back"></div>
        <div class="forest-layer layer-mid"></div>
        <div class="forest-layer layer-front"></div>
        <div class="fireflies"></div>
    </div>

    <div class="app-wrapper">
        <!-- Sidebar Navigation -->
        {% include "includes/sidebar.html" with active_tab="history" %}

        <!-- Main Panel Workspace -->
        <main class="app-content">
            <!-- Top Navbar -->
            <header class="app-navbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="sidebar-toggler sidebar-toggle-btn d-lg-block text-white"
                        aria-label="Toggle Sidebar"><i class="bi bi-list"></i></button>
                </div>
            </header>

            <!-- Milestone Tracker Content -->
            <div class="app-body">
                <div class="mb-4">
                    <h2 class="text-white mb-1">My Milestone History</h2>
                    <p class="text-secondary small mb-0">Review your achievements, timeline logs, and cohort milestones.
                    </p>
                </div>

                <div class="glass-panel p-5 col-lg-9">
                    <h4 class="text-white mb-4">Timeline Milestones</h4>

                    <div id="milestone-list" class="timeline">
                        <!-- Dynamic list of milestones loads here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/mockData.js"></script>
    <script src="/static/js/app.js?v={% now "U" %}"></script>
</body>

</html>
