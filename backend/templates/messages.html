<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - BlueNova</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css?v=6.7" rel="stylesheet">
</head>

<body class="bg-user">

    {% if request.user.is_authenticated %}
    <script>
        localStorage.setItem("erp_users", '{{ json_users|escapejs }}');
        localStorage.setItem("erp_files", '{{ json_files|escapejs }}');
        localStorage.setItem("erp_notifications", '{{ json_notifications|escapejs }}');
        localStorage.setItem("erp_messages", '{{ json_messages|escapejs }}');
        localStorage.setItem("erp_logs", '{{ json_logs|escapejs }}');
        localStorage.setItem("erp_history", '{{ json_history|escapejs }}');
        localStorage.setItem("erp_session", '{{ session_token }}');
    </script>
    {% endif %}


    
    <!-- Forest Animation Background -->
    <div class="forest-bg-container">
        <div class="forest-layer layer-back"></div>
        <div class="forest-layer layer-mid"></div>
        <div class="forest-layer layer-front"></div>
        <div class="fireflies"></div>
    </div>

    <div class="app-wrapper">
        <!-- Sidebar Navigation -->
        {% include "includes/sidebar.html" with active_tab="messages" %}

        <!-- Main Panel Workspace -->
        <main class="app-content">
            <!-- Top Navbar -->
            <header class="app-navbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="sidebar-toggler sidebar-toggle-btn d-lg-block text-white"
                        aria-label="Toggle Sidebar"><i class="bi bi-list"></i></button>
                </div>
            </header>

            <!-- Messaging Board -->
            <div class="app-body d-flex flex-column"
                style="height: calc(100vh - var(--navbar-height)); overflow: hidden;">
                <div class="mb-4">
                    <h2 class="text-white mb-1">Messages Portal</h2>
                    <p class="text-secondary small mb-0">Communicate directly between cohort candidates and system
                        administration.</p>
                </div>

                <div class="row g-4 flex-grow-1 overflow-hidden mb-3">
                    <!-- Contacts List -->
                    <div class="col-md-4 d-flex flex-column h-100 overflow-y-auto" id="inbox-list">
                        <!-- Populated dynamically -->
                    </div>

                    <!-- Chat Box Window -->
                    <div class="col-md-8 d-flex flex-column h-100 glass-panel p-4" id="chat-window" data-active-user="1"
                        style="max-height: 480px;">
                        <div class="border-bottom border-secondary-subtle pb-3 mb-3">
                            <h4 class="text-white mb-0" id="chat-partner-name">Select Contact</h4>
                            <span class="small text-muted">Direct ERP Correspondence</span>
                        </div>

                        <!-- History bubbles container -->
                        <div class="flex-grow-1 overflow-y-auto d-flex flex-column mb-3" id="chat-history"
                            style="padding-right: 5px;">
                            <!-- Populated dynamically -->
                        </div>

                        <!-- Reply Input Form -->
                        <form id="message-reply-form" class="mt-auto">
                            {% csrf_token %}

                            <div class="input-group">
                                <input type="text" id="message-input" class="form-control form-control-premium py-3"
                                    placeholder="Type your response here..." required autocomplete="off">
                                <button type="submit" class="btn btn-premium px-4"><i
                                        class="bi bi-send-fill"></i></button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/mockData.js"></script>
    <script src="/static/js/app.js?v={% now "U" %}"></script>
    <script>
        // Client-side sidebar overrides removed. Server-side include is used.
    </script>
</body>

</html>
