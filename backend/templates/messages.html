<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - BlueNova ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>

    {% if request.user.is_authenticated %}
    <script>
        localStorage.setItem("erp_users", '{{ json_users|escapejs }}');
        localStorage.setItem("erp_files", '{{ json_files|escapejs }}');
        localStorage.setItem("erp_notifications", '{{ json_notifications|escapejs }}');
        localStorage.setItem("erp_messages", '{{ json_messages|escapejs }}');
        localStorage.setItem("erp_logs", '{{ json_logs|escapejs }}');
        localStorage.setItem("erp_history", '{{ json_history|escapejs }}');
        localStorage.setItem("erp_session", '{{ session_token }}');
    </script>
    {% endif %}
    

    <div class="app-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="app-sidebar" id="msg-sidebar-aside">
            <div class="sidebar-header">
                <a href="/erp/dashboard/" class="d-flex align-items-center gap-2 fw-bold text-white text-decoration-none">
                    <i class="bi bi-rocket-takeoff-fill text-primary"></i> <span id="sidebar-logo-text">BlueNova ERP</span>
                </a>
                <button class="sidebar-toggler sidebar-toggle-btn d-lg-none"><i class="bi bi-x-lg"></i></button>
            </div>
            <ul class="sidebar-menu" id="msg-sidebar-menu">
                <!-- Loaded based on roles -->
            </ul>
        </aside>

        <!-- Main Panel Workspace -->
        <main class="app-content">
            <!-- Top Navbar -->
            <header class="app-navbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="sidebar-toggler sidebar-toggle-btn d-lg-block text-white" aria-label="Toggle Sidebar"><i class="bi bi-list"></i></button>
                </div>
            </header>

            <!-- Messaging Board -->
            <div class="app-body d-flex flex-column" style="height: calc(100vh - var(--navbar-height)); overflow: hidden;">
                <div class="mb-4">
                    <h2 class="text-white mb-1">Messages Portal</h2>
                    <p class="text-secondary small mb-0">Communicate directly between cohort candidates and system administration.</p>
                </div>

                <div class="row g-4 flex-grow-1 overflow-hidden mb-3">
                    <!-- Contacts List -->
                    <div class="col-md-4 d-flex flex-column h-100 overflow-y-auto" id="inbox-list">
                        <!-- Populated dynamically -->
                    </div>
                    
                    <!-- Chat Box Window -->
                    <div class="col-md-8 d-flex flex-column h-100 glass-panel p-4" id="chat-window" data-active-user="1" style="max-height: 480px;">
                        <div class="border-bottom border-secondary-subtle pb-3 mb-3">
                            <h4 class="text-white mb-0" id="chat-partner-name">Select Contact</h4>
                            <span class="small text-muted">Direct ERP Correspondence</span>
                        </div>
                        
                        <!-- History bubbles container -->
                        <div class="flex-grow-1 overflow-y-auto d-flex flex-column mb-3" id="chat-history" style="padding-right: 5px;">
                            <!-- Populated dynamically -->
                        </div>
                        
                        <!-- Reply Input Form -->
                        <form id="message-reply-form" class="mt-auto">
{% csrf_token %}

                            <div class="input-group">
                                <input type="text" id="message-input" class="form-control form-control-premium py-3" placeholder="Type your response here..." required autocomplete="off">
                                <button type="submit" class="btn btn-premium px-4"><i class="bi bi-send-fill"></i></button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/mockData.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        const u = getLoggedInUser();
        if (u) {
            const menu = document.getElementById("msg-sidebar-menu");
            const logoText = document.getElementById("sidebar-logo-text");
            const homeLink = document.querySelector("#msg-sidebar-aside a");
            
            if (u.role === "admin") {
                homeLink.href = "admin-dashboard.html";
                menu.innerHTML = `
                    <li class="sidebar-item"><a href="/erp/admin-dashboard/" class="sidebar-link"><i class="bi bi-grid-fill"></i> <span>Control Center</span></a></li>
                    <li class="sidebar-item"><a href="/erp/user-management/" class="sidebar-link"><i class="bi bi-people-fill"></i> <span>User Accounts</span></a></li>
                    <li class="sidebar-item"><a href="{% url 'admin_applications' %}" class="sidebar-link"><i class="bi bi-person-lines-fill"></i> <span>Applications</span></a></li>
                    <li class="sidebar-item"><a href="{% url 'lms_dashboard' %}" class="sidebar-link"><i class="bi bi-mortarboard-fill"></i> <span>Learning Portal</span></a></li>
                    <li class="sidebar-item active"><a href="/erp/messages/" class="sidebar-link"><i class="bi bi-chat-left-text-fill"></i> <span>Messages</span></a></li>
                    <li class="sidebar-item"><a href="/erp/data-management/" class="sidebar-link"><i class="bi bi-hdd-network-fill"></i> <span>Data Control</span></a></li>
                    <li class="sidebar-item"><a href="/erp/activity-logs/" class="sidebar-link"><i class="bi bi-journal-text"></i> <span>Activity Logs</span></a></li>
                    <li class="sidebar-item"><a href="/erp/notifications/" class="sidebar-link"><i class="bi bi-bell-fill"></i> <span>Notifications</span></a></li>
                    <li class="sidebar-item"><a href="/erp/reports/" class="sidebar-link"><i class="bi bi-file-earmark-pdf-fill"></i> <span>Reports Desk</span></a></li>
                    <li class="sidebar-item"><a href="/erp/analytics/" class="sidebar-link"><i class="bi bi-bar-chart-fill"></i> <span>Analytics</span></a></li>
                    <li class="sidebar-item mt-4"><a href="/auth/logout/" class="sidebar-link text-danger"><i class="bi bi-box-arrow-right"></i> <span>Sign Out</span></a></li>
                `;
            } else {
                homeLink.href = "dashboard.html";
                menu.innerHTML = `
                    <li class="sidebar-item"><a href="/erp/dashboard/" class="sidebar-link"><i class="bi bi-grid-fill"></i> <span>Dashboard</span></a></li>
                    <li class="sidebar-item"><a href="/erp/profile/" class="sidebar-link"><i class="bi bi-person-fill"></i> <span>My Profile</span></a></li>
                    <li class="sidebar-item"><a href="{% url 'lms_dashboard' %}" class="sidebar-link"><i class="bi bi-mortarboard-fill"></i> <span>Learning Portal</span></a></li>
                    <li class="sidebar-item"><a href="/erp/upload-files/" class="sidebar-link"><i class="bi bi-cloud-arrow-up-fill"></i> <span>Upload Files</span></a></li>
                    <li class="sidebar-item active"><a href="/erp/messages/" class="sidebar-link"><i class="bi bi-chat-left-text-fill"></i> <span>Messages</span></a></li>
                    <li class="sidebar-item"><a href="/erp/history/" class="sidebar-link"><i class="bi bi-clock-history"></i> <span>History</span></a></li>
                    <li class="sidebar-item"><a href="/erp/help-center/" class="sidebar-link"><i class="bi bi-question-circle-fill"></i> <span>Help Center</span></a></li>
                    <li class="sidebar-item"><a href="/erp/feedback/" class="sidebar-link"><i class="bi bi-star-fill"></i> <span>Feedback</span></a></li>
                    <li class="sidebar-item"><a href="{% url 'settings' %}" class="sidebar-link"><i class="bi bi-gear-fill"></i> <span>Settings</span></a></li>
                    <li class="sidebar-item mt-5"><a href="/auth/logout/" class="sidebar-link text-danger"><i class="bi bi-box-arrow-right"></i> <span>Sign Out</span></a></li>
                `;
            }
        }
    </script>
</body>
</html>
