<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - BlueNova</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css?v=6.7" rel="stylesheet">
</head>
<body>

    {% if request.user.is_authenticated %}
    <script>
        localStorage.setItem("erp_users", '{{ json_users|escapejs }}');
        localStorage.setItem("erp_files", '{{ json_files|escapejs }}');
        localStorage.setItem("erp_notifications", '{{ json_notifications|escapejs }}');
        localStorage.setItem("erp_messages", '{{ json_messages|escapejs }}');
        localStorage.setItem("erp_logs", '{{ json_logs|escapejs }}');
        localStorage.setItem("erp_history", '{{ json_history|escapejs }}');
        localStorage.setItem("erp_session", '{{ session_token }}');
    </script>
    {% endif %}
    

    
    <!-- Forest Animation Background -->
    <div class="forest-bg-container">
        <div class="forest-layer layer-back"></div>
        <div class="forest-layer layer-mid"></div>
        <div class="forest-layer layer-front"></div>
        <div class="fireflies"></div>
    </div>

    <div class="app-wrapper">
        <!-- Sidebar Navigation -->
        {% include "includes/sidebar.html" with active_tab="search" %}

        <!-- Main Panel Workspace -->
        <main class="app-content">
            <!-- Top Navbar -->
            <header class="app-navbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="sidebar-toggler sidebar-toggle-btn d-lg-block text-white" aria-label="Toggle Sidebar"><i class="bi bi-list"></i></button>
                </div>
            </header>

            <!-- Search Workspace Content -->
            <div class="app-body">
                <div class="mb-4">
                    <h2 class="text-white mb-1">Search Results</h2>
                    <p class="text-secondary small mb-0">Search query outcomes from candidates profiles and files records.</p>
                </div>

                <div class="glass-panel p-4 mb-4 col-lg-9">
                    <form id="search-form">
{% csrf_token %}

                        <div class="input-group">
                            <input type="text" id="search-input-field" class="form-control form-control-premium py-3" placeholder="Enter keywords (e.g. John, zip, design)..." required>
                            <button type="submit" class="btn btn-premium px-4"><i class="bi bi-search"></i> Search</button>
                        </div>
                    </form>
                </div>

                <h4 class="text-white mb-3">Matching Databases Records</h4>
                <div id="search-results-list" class="col-lg-9">
                    <!-- Populated dynamically via app.js -->
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/mockData.js"></script>
    <script src="/static/js/app.js?v={% now "U" %}"></script>
    <script>
        // Client-side sidebar overrides removed. Server-side include is used.
    </script>
</body>
</html>
