<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - BlueNova ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <div class="app-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="app-sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="d-flex align-items-center gap-2 fw-bold text-white text-decoration-none">
                    <i class="bi bi-rocket-takeoff-fill text-primary"></i> <span>BlueNova ERP</span>
                </a>
                <button class="sidebar-toggler sidebar-toggle-btn d-lg-none"><i class="bi bi-x-lg"></i></button>
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-item">
                    <a href="dashboard.html" class="sidebar-link"><i class="bi bi-grid-fill"></i> <span>Dashboard</span></a>
                </li>
                <li class="sidebar-item">
                    <a href="profile.html" class="sidebar-link"><i class="bi bi-person-fill"></i> <span>My Profile</span></a>
                </li>
                <li class="sidebar-item">
                    <a href="upload-files.html" class="sidebar-link"><i class="bi bi-cloud-arrow-up-fill"></i> <span>Upload Files</span></a>
                </li>
                <li class="sidebar-item">
                    <a href="messages.html" class="sidebar-link"><i class="bi bi-chat-left-text-fill"></i> <span>Messages</span></a>
                </li>
                <li class="sidebar-item">
                    <a href="history.html" class="sidebar-link"><i class="bi bi-clock-history"></i> <span>History</span></a>
                </li>
                <li class="sidebar-item">
                    <a href="help-center.html" class="sidebar-link"><i class="bi bi-question-circle-fill"></i> <span>Help Center</span></a>
                </li>
                <li class="sidebar-item active">
                    <a href="feedback.html" class="sidebar-link"><i class="bi bi-star-fill"></i> <span>Feedback</span></a>
                </li>
                <li class="sidebar-item">
                    <a href="settings.html" class="sidebar-link"><i class="bi bi-gear-fill"></i> <span>Settings</span></a>
                </li>
                <li class="sidebar-item mt-5">
                    <a href="logout.html" class="sidebar-link text-danger"><i class="bi bi-box-arrow-right"></i> <span>Sign Out</span></a>
                </li>
            </ul>
        </aside>

        <!-- Main Panel Workspace -->
        <main class="app-content">
            <!-- Top Navbar -->
            <header class="app-navbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="sidebar-toggler sidebar-toggle-btn d-lg-block text-white" aria-label="Toggle Sidebar"><i class="bi bi-list"></i></button>
                </div>
            </header>

            <!-- Feedback form page content -->
            <div class="app-body">
                <div class="mb-4">
                    <h2 class="text-white mb-1">Internship Experience Feedback</h2>
                    <p class="text-secondary small mb-0">Help us improve BlueNova cohort processes by submitting your rating and comments.</p>
                </div>

                <div class="glass-panel p-5 col-lg-8">
                    <h4 class="text-white mb-4">Rate Your Cohort</h4>
                    <form id="feedbackForm">
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Overall Rating (1 to 5 Stars)</label>
                            <select id="fb-rating" class="form-select form-control-premium" required>
                                <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                                <option value="4">⭐⭐⭐⭐ (Good)</option>
                                <option value="3">⭐⭐⭐ (Average)</option>
                                <option value="2">⭐⭐ (Fair)</option>
                                <option value="1">⭐ (Poor)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Feedback Topic / Subject</label>
                            <input type="text" id="fb-subject" class="form-control form-control-premium" placeholder="e.g. Mentor session scheduling feedback" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-secondary small">Comments / Details</label>
                            <textarea id="fb-message" class="form-control form-control-premium" rows="5" placeholder="Share your experience details..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-premium px-5 py-3">Submit Feedback</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mockData.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
