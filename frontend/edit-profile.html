<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - BlueNova</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <div class="app-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="app-sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="d-flex align-items-center gap-2 fw-bold text-white text-decoration-none">
                    <i class="bi bi-rocket-takeoff-fill text-primary"></i> <span>BlueNova</span>
                </a>
                <button class="sidebar-toggler sidebar-toggle-btn d-lg-none"><i class="bi bi-x-lg"></i></button>
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-item">
                    <a href="dashboard.html" class="sidebar-link"><i class="bi bi-grid-fill"></i> <span>Dashboard</span></a>
                </li>
                <li class="sidebar-item active">
                    <a href="profile.html" class="sidebar-link"><i class="bi bi-person-fill"></i> <span>My Profile</span></a>
                </li>
                <li class="sidebar-item">
                    <a href="upload-files.html" class="sidebar-link"><i class="bi bi-cloud-arrow-up-fill"></i> <span>Upload Files</span></a>
                </li>
                <li class="sidebar-item">
                    <a href="messages.html" class="sidebar-link"><i class="bi bi-chat-left-text-fill"></i> <span>Messages</span></a>
                </li>
                <li class="sidebar-item">
                    <a href="history.html" class="sidebar-link"><i class="bi bi-clock-history"></i> <span>History</span></a>
                </li>
                <li class="sidebar-item">
                    <a href="help-center.html" class="sidebar-link"><i class="bi bi-question-circle-fill"></i> <span>Help Center</span></a>
                </li>
                <li class="sidebar-item">
                    <a href="feedback.html" class="sidebar-link"><i class="bi bi-star-fill"></i> <span>Feedback</span></a>
                </li>
                <li class="sidebar-item">
                    <a href="settings.html" class="sidebar-link"><i class="bi bi-gear-fill"></i> <span>Settings</span></a>
                </li>
                <li class="sidebar-item mt-5">
                    <a href="logout.html" class="sidebar-link text-danger"><i class="bi bi-box-arrow-right"></i> <span>Sign Out</span></a>
                </li>
            </ul>
        </aside>

        <!-- Main Panel Workspace -->
        <main class="app-content">
            <!-- Top Navbar -->
            <header class="app-navbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="sidebar-toggler sidebar-toggle-btn d-lg-block text-white" aria-label="Toggle Sidebar"><i class="bi bi-list"></i></button>
                </div>
                <div class="d-flex align-items-center gap-4">
                    <button class="theme-switch theme-toggle-btn" aria-label="Toggle Theme"></button>
                </div>
            </header>

            <!-- Edit Details Content -->
            <div class="app-body">
                <div class="mb-4">
                    <h2 class="text-white mb-1">Edit Account Details</h2>
                    <p class="text-secondary small mb-0">Modify your dashboard and profile options.</p>
                </div>

                <div class="glass-panel p-5 col-lg-9">
                    <form id="editProfileForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-secondary small">Full Name</label>
                                <input type="text" id="p-fullname" class="form-control form-control-premium" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary small">Phone Number</label>
                                <input type="text" id="p-phone" class="form-control form-control-premium">
                            </div>
                            <div class="col-12">
                                <label class="form-label text-secondary small">Specialized Track</label>
                                <select id="p-track" class="form-select form-control-premium">
                                    <option value="Software Engineering">Software Engineering</option>
                                    <option value="UI/UX Design">UI/UX Design</option>
                                    <option value="Data Analytics">Data Analytics</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label text-secondary small">Academic Background</label>
                                <input type="text" id="p-academic" class="form-control form-control-premium" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label text-secondary small">Skills (comma-separated)</label>
                                <input type="text" id="p-skills" class="form-control form-control-premium" placeholder="e.g. Java, Python, Figma">
                            </div>
                            <div class="col-12 mb-4">
                                <label class="form-label text-secondary small">Biography</label>
                                <textarea id="p-bio" class="form-control form-control-premium" rows="4"></textarea>
                            </div>
                            <div class="col-12 d-flex gap-2">
                                <button type="submit" class="btn btn-premium px-4">Save Changes</button>
                                <a href="profile.html" class="btn btn-secondary-premium px-4">Cancel</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mockData.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
