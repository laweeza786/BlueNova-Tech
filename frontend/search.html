<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - BlueNova ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <div class="app-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="app-sidebar" id="search-sidebar-aside">
            <div class="sidebar-header">
                <a href="dashboard.html" class="d-flex align-items-center gap-2 fw-bold text-white text-decoration-none">
                    <i class="bi bi-rocket-takeoff-fill text-primary"></i> <span id="sidebar-logo-text">BlueNova ERP</span>
                </a>
                <button class="sidebar-toggler sidebar-toggle-btn d-lg-none"><i class="bi bi-x-lg"></i></button>
            </div>
            <ul class="sidebar-menu" id="search-sidebar-menu">
                <!-- Populated dynamically -->
            </ul>
        </aside>

        <!-- Main Panel Workspace -->
        <main class="app-content">
            <!-- Top Navbar -->
            <header class="app-navbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="sidebar-toggler sidebar-toggle-btn d-lg-block text-white" aria-label="Toggle Sidebar"><i class="bi bi-list"></i></button>
                </div>
            </header>

            <!-- Search Workspace Content -->
            <div class="app-body">
                <div class="mb-4">
                    <h2 class="text-white mb-1">Search Results</h2>
                    <p class="text-secondary small mb-0">Search query outcomes from candidates profiles and files records.</p>
                </div>

                <div class="glass-panel p-4 mb-4 col-lg-9">
                    <form id="search-form">
                        <div class="input-group">
                            <input type="text" id="search-input-field" class="form-control form-control-premium py-3" placeholder="Enter keywords (e.g. John, zip, design)..." required>
                            <button type="submit" class="btn btn-premium px-4"><i class="bi bi-search"></i> Search</button>
                        </div>
                    </form>
                </div>

                <h4 class="text-white mb-3">Matching Databases Records</h4>
                <div id="search-results-list" class="col-lg-9">
                    <!-- Populated dynamically via app.js -->
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mockData.js"></script>
    <script src="js/app.js"></script>
    <script>
        const u = getLoggedInUser();
        if (u) {
            const menu = document.getElementById("search-sidebar-menu");
            const logoText = document.getElementById("sidebar-logo-text");
            const homeLink = document.querySelector("#search-sidebar-aside a");
            
            if (u.role === "admin") {
                homeLink.href = "admin-dashboard.html";
                menu.innerHTML = `
                    <li class="sidebar-item"><a href="admin-dashboard.html" class="sidebar-link"><i class="bi bi-grid-fill"></i> <span>Control Center</span></a></li>
                    <li class="sidebar-item"><a href="user-management.html" class="sidebar-link"><i class="bi bi-people-fill"></i> <span>User Accounts</span></a></li>
                    <li class="sidebar-item"><a href="messages.html" class="sidebar-link"><i class="bi bi-chat-left-text-fill"></i> <span>Messages</span></a></li>
                    <li class="sidebar-item"><a href="data-management.html" class="sidebar-link"><i class="bi bi-hdd-network-fill"></i> <span>Data Control</span></a></li>
                    <li class="sidebar-item"><a href="activity-logs.html" class="sidebar-link"><i class="bi bi-journal-text"></i> <span>Activity Logs</span></a></li>
                    <li class="sidebar-item"><a href="notifications.html" class="sidebar-link"><i class="bi bi-bell-fill"></i> <span>Notifications</span></a></li>
                    <li class="sidebar-item"><a href="reports.html" class="sidebar-link"><i class="bi bi-file-earmark-pdf-fill"></i> <span>Reports Desk</span></a></li>
                    <li class="sidebar-item"><a href="analytics.html" class="sidebar-link"><i class="bi bi-bar-chart-fill"></i> <span>Analytics</span></a></li>
                    <li class="sidebar-item mt-4"><a href="logout.html" class="sidebar-link text-danger"><i class="bi bi-box-arrow-right"></i> <span>Sign Out</span></a></li>
                `;
            } else {
                homeLink.href = "dashboard.html";
                menu.innerHTML = `
                    <li class="sidebar-item"><a href="dashboard.html" class="sidebar-link"><i class="bi bi-grid-fill"></i> <span>Dashboard</span></a></li>
                    <li class="sidebar-item"><a href="profile.html" class="sidebar-link"><i class="bi bi-person-fill"></i> <span>My Profile</span></a></li>
                    <li class="sidebar-item"><a href="upload-files.html" class="sidebar-link"><i class="bi bi-cloud-arrow-up-fill"></i> <span>Upload Files</span></a></li>
                    <li class="sidebar-item"><a href="messages.html" class="sidebar-link"><i class="bi bi-chat-left-text-fill"></i> <span>Messages</span></a></li>
                    <li class="sidebar-item"><a href="history.html" class="sidebar-link"><i class="bi bi-clock-history"></i> <span>History</span></a></li>
                    <li class="sidebar-item"><a href="help-center.html" class="sidebar-link"><i class="bi bi-question-circle-fill"></i> <span>Help Center</span></a></li>
                    <li class="sidebar-item"><a href="feedback.html" class="sidebar-link"><i class="bi bi-star-fill"></i> <span>Feedback</span></a></li>
                    <li class="sidebar-item"><a href="settings.html" class="sidebar-link"><i class="bi bi-gear-fill"></i> <span>Settings</span></a></li>
                    <li class="sidebar-item mt-5"><a href="logout.html" class="sidebar-link text-danger"><i class="bi bi-box-arrow-right"></i> <span>Sign Out</span></a></li>
                `;
            }
        }
    </script>
</body>
</html>
