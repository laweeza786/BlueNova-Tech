<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply / Sign Up - BlueNova Technologies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <!-- Glowing Background Orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="container py-5" style="margin-top: 40px; margin-bottom: 40px;">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 text-center">
                <a class="d-inline-flex align-items-center gap-2 fw-bold text-white fs-3 mb-4 text-decoration-none" href="index.html">
                    <i class="bi bi-rocket-takeoff-fill text-primary"></i> BlueNova <span class="gradient-text">ERP</span>
                </a>
                
                <div class="glass-panel p-5 text-start">
                    <h3 class="text-white mb-2">Apply for Internship</h3>
                    <p class="text-secondary small mb-4">Complete the fields below to submit your application details.</p>
                    
                    <div id="signup-alert" class="alert alert-danger d-none small py-2" role="alert"></div>
                    <div id="signup-success" class="alert alert-success d-none small py-2" role="alert"></div>
                    
                    <form id="signupForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-secondary small">Username</label>
                                <input type="text" id="s-username" class="form-control form-control-premium" required placeholder="johndoe">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary small">Email Address</label>
                                <input type="email" id="s-email" class="form-control form-control-premium" required placeholder="john@example.com">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary small">Full Name</label>
                                <input type="text" id="s-fullname" class="form-control form-control-premium" required placeholder="John Doe">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary small">Track</label>
                                <select id="s-track" class="form-select form-control-premium" required>
                                    <option value="" disabled selected>Select Specialized Track</option>
                                    <option value="Software Engineering">Software Engineering</option>
                                    <option value="UI/UX Design">UI/UX Design</option>
                                    <option value="Data Analytics">Data Analytics</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label text-secondary small">Academic Background</label>
                                <input type="text" id="s-academic" class="form-control form-control-premium" required placeholder="B.S. Computer Science, Stanford University">
                            </div>
                            <div class="col-12">
                                <label class="form-label text-secondary small">Bio Summary</label>
                                <textarea id="s-bio" class="form-control form-control-premium" rows="3" required placeholder="Tell us briefly about your engineering/design goals..."></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary small">Password</label>
                                <input type="password" id="s-password" class="form-control form-control-premium" required placeholder="••••••••">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary small">Confirm Password</label>
                                <input type="password" id="s-confirm" class="form-control form-control-premium" required placeholder="••••••••">
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" id="signup-submit-btn" class="btn btn-premium w-100 py-3">Submit Application</button>
                            </div>
                        </div>
                    </form>
                    
                    <div class="text-center mt-4">
                        <span class="small text-secondary">Already applied? <a href="{% url \'login\' %}" class="text-primary text-decoration-none fw-semibold">Login here</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mockData.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById("signupForm").addEventListener("submit", (e) => {
            e.preventDefault();
            
            const username = document.getElementById("s-username").value.trim().toLowerCase();
            const email = document.getElementById("s-email").value.trim();
            const fullname = document.getElementById("s-fullname").value.trim();
            const track = document.getElementById("s-track").value;
            const academic = document.getElementById("s-academic").value.trim();
            const bio = document.getElementById("s-bio").value.trim();
            const password = document.getElementById("s-password").value;
            const confirmPass = document.getElementById("s-confirm").value;
            
            const alertBox = document.getElementById("signup-alert");
            const successBox = document.getElementById("signup-success");
            const btn = document.getElementById("signup-submit-btn");
            
            alertBox.classList.add("d-none");
            successBox.classList.add("d-none");
            
            // Password confirmation check
            if (password !== confirmPass) {
                alertBox.textContent = "Passwords do not match.";
                alertBox.classList.remove("d-none");
                return;
            }
            
            btn.disabled = true;
            btn.textContent = "Submitting...";
            
            setTimeout(() => {
                const users = JSON.parse(localStorage.getItem("erp_users") || "[]");
                
                // Check if user already exists
                if (users.find(u => u.username === username || u.email === email)) {
                    btn.disabled = false;
                    btn.textContent = "Submit Application";
                    alertBox.textContent = "Username or email is already registered.";
                    alertBox.classList.remove("d-none");
                    return;
                }
                
                const newUser = {
                    id: users.length + 1,
                    username: username,
                    email: email,
                    role: "user",
                    token: `user-session-token-${username}`,
                    track: track,
                    status: "pending",
                    full_name: fullname,
                    phone: "",
                    bio: bio,
                    academic_background: academic,
                    skills: "",
                    avatar: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80",
                    resume: ""
                };
                
                users.push(newUser);
                localStorage.setItem("erp_users", JSON.stringify(users));
                
                // Add default history logs for this intern
                const history = JSON.parse(localStorage.getItem("erp_history") || "[]");
                history.push({
                    id: history.length + 1,
                    user_id: newUser.id,
                    milestone_name: "Application Submitted",
                    description: "Your internship request has been successfully filed in the recruitment panel.",
                    achieved_at: new Date().toISOString()
                });
                localStorage.setItem("erp_history", JSON.stringify(history));
                
                // Add initial notification
                const notifications = JSON.parse(localStorage.getItem("erp_notifications") || "[]");
                notifications.push({
                    id: notifications.length + 1,
                    user_id: newUser.id,
                    title: "Application Received",
                    message: "Welcome to BlueNova ERP! Your application is currently pending developer team review.",
                    level: "warning",
                    is_read: false,
                    created_at: new Date().toISOString()
                });
                localStorage.setItem("erp_notifications", JSON.stringify(notifications));
                
                successBox.textContent = "Application submitted successfully! Redirecting to login...";
                successBox.classList.remove("d-none");
                
                setTimeout(() => {
                    window.location.href = "/auth/login/";
                }, 1500);
            }, 800);
        });
    </script>
</body>
</html>
