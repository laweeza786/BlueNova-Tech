<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BlueNova Technologies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <!-- Glowing Background Orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 text-center">
                <a class="d-inline-flex align-items-center gap-2 fw-bold text-white fs-3 mb-4 text-decoration-none" href="index.html">
                    <i class="bi bi-rocket-takeoff-fill text-primary"></i> BlueNova <span class="gradient-text">ERP</span>
                </a>
                
                <div class="glass-panel p-5 text-start">
                    <h3 class="text-white mb-2">Welcome Back</h3>
                    <p class="text-secondary small mb-4">Enter your credentials to enter the BlueNova platform.</p>
                    
                    <div id="login-alert" class="alert alert-danger d-none small py-2" role="alert"></div>
                    
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Username or Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0" style="border: 1px solid var(--card-border); color: var(--text-secondary);"><i class="bi bi-person"></i></span>
                                <input type="text" id="login-username" class="form-control form-control-premium border-start-0" required placeholder="Enter username (e.g. admin or johndoe)">
                            </div>
                        </div>
                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label class="form-label text-secondary small">Password</label>
                                <a href="forgot-password.html" class="small text-primary text-decoration-none">Forgot password?</a>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0" style="border: 1px solid var(--card-border); color: var(--text-secondary);"><i class="bi bi-lock"></i></span>
                                <input type="password" id="login-password" class="form-control form-control-premium border-start-0" required placeholder="••••••••">
                            </div>
                        </div>
                        
                        <button type="submit" id="login-submit-btn" class="btn btn-premium w-100 py-3 mb-3">Sign In</button>
                        
                        <div class="text-center">
                            <span class="small text-secondary">Don't have an account? <a href="signup.html" class="text-primary text-decoration-none fw-semibold">Apply Now</a></span>
                        </div>
                    </form>
                </div>
                
                <div class="mt-4 small text-secondary">
                    Demo Credentials: <br>
                    Admin: <code>admin</code> / <code>admin</code> <br>
                    Intern: <code>johndoe</code> / <code>password</code>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mockData.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById("loginForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const usernameInput = document.getElementById("login-username").value.trim().toLowerCase();
            const passwordInput = document.getElementById("login-password").value;
            const alertBox = document.getElementById("login-alert");
            const btn = document.getElementById("login-submit-btn");
            
            // Loading state
            btn.disabled = true;
            btn.textContent = "Authenticating...";
            alertBox.classList.add("d-none");
            
            setTimeout(() => {
                const users = JSON.parse(localStorage.getItem("erp_users") || "[]");
                
                // For simplicity of prototype, standard usernames matching database
                const foundUser = users.find(u => (u.username === usernameInput || u.email === usernameInput));
                
                if (foundUser) {
                    // Password matches admin or password
                    if ((foundUser.role === 'admin' && passwordInput === 'admin') || (foundUser.role === 'user' && passwordInput === 'password')) {
                        localStorage.setItem("erp_session", foundUser.token);
                        showToast("Login successful!", "success");
                        
                        // Set redirection
                        if (foundUser.role === "admin") {
                            window.location.href = "admin-dashboard.html";
                        } else {
                            window.location.href = "dashboard.html";
                        }
                        return;
                    }
                }
                
                // Fail
                btn.disabled = false;
                btn.textContent = "Sign In";
                alertBox.textContent = "Invalid username/email or password.";
                alertBox.classList.remove("d-none");
            }, 800);
        });
    </script>
</body>
</html>
